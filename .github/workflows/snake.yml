name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Generate snake
      - uses: Platane/snk@v3
        with:
          github_user_name: Akash007-Mern
          outputs: |
            dist/github-contribution-grid-snake.svg

      # Push to output branch (FIXED)
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
